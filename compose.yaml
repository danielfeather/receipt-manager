services:
  traefik:
    image: traefik:v3.7
    command:
      - '--api.insecure=true'
      - '--providers.file.directory=/etc/traefik/dynamic'
      - '--providers.docker=true'
      - '--providers.docker.exposedbydefault=false'
      - '--entrypoints.web.address=:80'
      - '--entrypoints.websecure.address=:443'
    labels:
      - 'traefik.http.middlewares.redirect-https.redirectscheme.scheme=https'
      - 'traefik.http.middlewares.redirect-https.redirectscheme.permanent=true'
    ports:
      - 80:80
      - 443:443
      - 8080:8080
    volumes:
      - '/var/run/docker.sock:/var/run/docker.sock:ro'
      - './traefik.yaml:/etc/traefik/dynamic/traefik.yml'
      - './cert.pem:/etc/certs/cert.pem'
      - './key.pem:/etc/certs/key.pem'
  app:
    build:
      context: .
      dockerfile: container/development/Dockerfile
    ports:
      - 5173:5173
    env_file:
      - .env
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.receipts.tls=true'
      - 'traefik.http.routers.receipts.rule=Host(`receipts.localhost`)'
      - 'traefik.http.services.receipts.loadbalancer.server.port=3000'
    volumes:
      - ~/.aws/credentials:/root/.aws/credentials
      - ./:/opt/receipt-manager
  
  migrations:
    depends_on:
      - db
    build:
      context: .
      dockerfile_inline: |
        FROM rust:1.95.0-alpine3.23@sha256:606fd313a0f49743ee2a7bd49a0914bab7deedb12791f3a846a34a4711db7ed2

        RUN cargo install sqlx-cli --no-default-features --features postgres

        CMD [ "sqlx", "migrate", "run" ]
    env_file:
      - .env
    volumes:
      - ./migrations:/migrations

  db:
    image: postgres:18.4-alpine3.23@sha256:563d9a314daa3a9f8e3249e217514210a747970c36d50d83ae5e9dc6749fe354
    ports:
      - 5432:5432
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql

volumes:
  db_data: