name: Build and Deploy

on: 
  push:
    branches:
      - "main"
  
permissions:  # added using https://github.com/step-security/secure-repo
  contents: read

jobs:
    build:
      permissions:
        contents: read
        packages: write
      runs-on: ubuntu-24.04-arm
      steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

        - name: Harden the runner (Audit all outbound calls)
          uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
          with:
            egress-policy: audit

        - name: Docker meta
          id: meta
          uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
          with:
            # list of Docker images to use as base name for tags
            images: |
              ghcr.io/danielfeather/receipt-manager
            tags: |
              type=ref,event=branch
              type=sha

        - name: Login to GitHub Container Registry
          uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
        
        - name: Set up Docker Buildx
          uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

        - name: Build and push
          uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
          with:
            push: true
            file: container/production/Containerfile
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
            cache-from: type=gha
            cache-to: type=gha,mode=max
  
    deploy:
      runs-on: ubuntu-latest
      needs: build
      permissions:
        id-token: write
        contents: read
      environment: production
      steps:
        - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

        - name: Harden the runner (Audit all outbound calls)
          uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
          with:
            egress-policy: audit

        - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # main
          with:
            tofu_version: 1.11.6
            checksums: |
              68026be376f8910a318645acc65f21da8b39ab86946cb0dd6cd16ef1705f34b3
              273f107f1f64734fcae4753796803a24b86ae0c383e433ab64bd5542ccd18772

        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@d979d5b3a71173a29b74b5b88418bfda9437d885 # v6.1.1
          with:
            role-to-assume: arn:aws:iam::043586862268:role/ReceiptManagerPipelineApply
            aws-region: eu-west-2

        - uses: azure/setup-kubectl@829323503d1be3d00ca8346e5391ca0b07a9ab0d # v5.1.0

        - name: Save ca
          env:
            CA_CERT: ${{ secrets.K8S_CERTIFICATE_AUTHORITY }}
          run: |
            echo $CA_CERT | base64 --decode > ca_cert.crt

        - name: Get OIDC token from GitHub
          id: get_token
          run: |
            token_json=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=thetearoom")
            oidc_token=$(echo "$token_json" | jq -r '.value')
            echo "token=${oidc_token}" >> $GITHUB_OUTPUT 

        - name: Setup config
          run: |
            kubectl config set-cluster default --server=${{ secrets.K8S_SERVER_URL }} --certificate-authority=./ca_cert.crt
            kubectl config set-credentials default --token="${{ steps.get_token.outputs.token }}"
            kubectl config set-context default --namespace=default --user=default --cluster=default
            kubectl config use-context default
          
        - name: OpenTofu Init
          run: |
            cd terraform
            tofu init -backend-config=config/production.config

        - name: OpenTofo Plan
          env:
            TF_VAR_hostname: ${{ secrets.HOSTNAME }}
          run: |
            tofu plan -var-file=vars/production.tfvars -out plan
            
        - name: OpenTofu Apply
          run: |
            tofu apply plan

        - name: Restart Deployment
          run: kubectl rollout restart deployment/receipt-manager -n receipt-manager
            