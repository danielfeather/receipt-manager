name: Build and Deploy

on: 
  push:
    branches:
      - "main"
  
permissions:  # added using https://github.com/step-security/secure-repo
  contents: read

jobs:
    build:
      permissions:
        packages: write
      runs-on: ubuntu-24.04-arm
      steps:

        - name: Harden the runner (Audit all outbound calls)
          uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
          with:
            egress-policy: audit

        - name: Docker meta
          id: meta
          uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5.10.0
          with:
            # list of Docker images to use as base name for tags
            images: |
              ghcr.io/danielfeather/receipt-manager
            tags: |
              type=ref,event=branch
              type=sha

        - name: Login to GitHub Container Registry
          uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
          with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}
        
        - name: Build and push
          uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
          with:
            push: true
            file: container/production/Containerfile
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
  
    deploy:
      runs-on: ubuntu-latest
      needs: build
      permissions:
        id-token: write
        contents: read
      steps:
        - name: Harden the runner (Audit all outbound calls)
          uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
          with:
            egress-policy: audit

        - uses: azure/setup-kubectl@776406bce94f63e41d621b960d78ee25c8b76ede # v4.0.1

        - name: Save ca
          env:
            CA_CERT: ${{ secrets.K8S_CERTIFICATE_AUTHORITY }}
          run: |
            echo $CA_CERT | base64 --decode > ca_cert.crt

        - name: Get OIDC token from GitHub
          id: get_token
          run: |
            token_json=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=thetearoom")
            oidc_token=$(echo "$token_json" | jq -r '.value')
            echo "token=${oidc_token}" >> $GITHUB_OUTPUT 

        - name: Setup config
          run: |
            ls
            kubectl config set-cluster default --server=${{ secrets.K8S_SERVER_URL }} --certificate-authority=./ca_cert.crt
            kubectl config set-credentials default --token="${{ steps.get_token.outputs.token }}"
            kubectl config set-context default --namespace=default --user=default --cluster=default
            kubectl config use-context default

        - name: Restart Deployment
          run: kubectl rollout restart deployment/receipt-manager -n receipt-manager
            