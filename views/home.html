<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Receipt Manager</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    {% for file in css %}
    <link href="/{{ file }}" rel="stylesheet" />
    {% endfor %}
  </head>
  <body class="w-full min-h-dvh font-[Inter] font-semibold">
    {% include "header.html" %}
    <main class="mt-8 container mx-auto px-4">
      <h1 class="font-bold text-2xl">My Receipts</h1>
      <div
        class="grid gap-2 grid-cols-2 md:grid-cols-3 lg:grid-cols-4 mt-4"
      ></div>
    </main>
    {% for file in scripts %}
    <script type="module" src="{{ file }}"></script>
    {% endfor %}
  </body>
</html>
